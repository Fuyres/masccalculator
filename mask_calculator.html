<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маска датчиков — Ворота негабаритности ЖД</title>
    <style>
        :root {
            --bg: #1a1d23;
            --panel-bg: #21252b;
            --border: #3a3f4b;
            --text: #e0e0e0;
            --text-secondary: #a0a8b4;
            --accent: #4da6ff;
            --danger: #e0556a;
            --success: #3fb950;
            --warning: #d4a72c;
            --input-bg: #2a2d35;
            --sensor-inactive: #4a4f5a;
            --sensor-active: #00e84c;
            --glow-active: 0 0 8px 3px #00e84c, 0 0 18px 6px #00e84c88, 0 0 30px 10px #00e84c44;
            --glow-inactive: 0 0 2px 1px #1a1a1a;
            --frame-color: #5a6270;
            --frame-dark: #3d4450;
            --frame-light: #6e7685;
            --rail-color: #7a7a7a;
            --ground-color: #5c4a3a;
            --ballast-color: #6b5b4a;
            --sky-top: #7eb8da;
            --sky-bottom: #c5d8e6;
            --stripe-yellow: #e8c547;
            --stripe-black: #2c2c2c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            user-select: none;
        }

        .app-container {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            padding: 28px 24px 20px;
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
        }
        .app-header .icon-gate {
            width: 40px;
            height: 40px;
            background: var(--frame-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            border: 2px solid var(--frame-light);
        }
        .app-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: #f0f0f0;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* ---- GATE AREA ---- */
        .gate-wrapper {
            flex: 1 1 620px;
            min-width: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gate-scene {
            position: relative;
            width: 620px;
            height: 500px;
            border-radius: 10px;
            overflow: hidden;
            cursor: default;
            background: linear-gradient(180deg, #8cb8d4 0%, #b8d4e8 25%, #c8dde8 50%, #d0d8df 70%, #b0b8c0 100%);
            border: 2px solid var(--border);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.15);
        }
        .gate-scene svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Sensor dots overlaid on gate */
        .sensor-dot {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: all 0.18s ease;
            transform: translate(-50%, -50%);
            background: var(--sensor-inactive);
            border: 2px solid #5a5f6a;
            box-shadow: var(--glow-inactive);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sensor-dot::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3a3d44;
            transition: all 0.18s ease;
        }
        .sensor-dot.active {
            background: #1a5c2a;
            border-color: #00e84c;
            box-shadow: var(--glow-active);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .sensor-dot.active::after {
            background: #00ff55;
            box-shadow: 0 0 6px 2px #00ff55;
        }
        .sensor-dot:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 20;
            border-color: #fff;
        }
        .sensor-dot:active {
            transform: translate(-50%, -50%) scale(1.05);
            transition: all 0.05s ease;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 8px 3px #00e84c, 0 0 18px 6px #00e84c88, 0 0 30px 10px #00e84c44;
            }
            50% {
                box-shadow: 0 0 12px 5px #00ff55, 0 0 24px 8px #00e84caa, 0 0 36px 14px #00e84c55;
            }
        }

        .sensor-label {
            position: absolute;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            pointer-events: none;
            z-index: 11;
            text-shadow: 0 0 3px #000, 0 0 6px #000;
            transform: translate(-50%, -50%);
            letter-spacing: 0.02em;
        }

        /* ---- RIGHT PANEL ---- */
        .right-panel {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #1e2128;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 16px;
            min-width: 240px;
        }
        .right-panel h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #d0d4dc;
            margin-bottom: 2px;
            letter-spacing: 0.02em;
        }
        .station-list {
            flex: 1;
            overflow-y: auto;
            max-height: 280px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #181b20;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .station-list .empty-msg {
            color: #5a5f6a;
            text-align: center;
            padding: 30px 10px;
            font-size: 0.85rem;
            font-style: italic;
        }
        .station-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #1e2229;
            border: 1px solid transparent;
            gap: 8px;
        }
        .station-item:hover {
            background: #252a33;
            border-color: #4a505d;
        }
        .station-item.selected {
            background: #253040;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(77, 166, 255, 0.2);
        }
        .station-item .st-name {
            font-weight: 500;
            font-size: 0.88rem;
            color: #d8dce3;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .station-item .st-mask {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .station-input-row {
            display: flex;
            gap: 6px;
        }
        .station-input-row input {
            flex: 1;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: border 0.15s;
            font-family: inherit;
        }
        .station-input-row input:focus {
            border-color: var(--accent);
        }
        .btn-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 14px;
            border-radius: 7px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s ease;
            font-family: inherit;
            letter-spacing: 0.02em;
            white-space: nowrap;
            flex: 1;
            min-width: 60px;
            text-align: center;
        }
        .btn-save {
            background: #1a4d2e;
            color: #7ee89e;
            border-color: #2d7a45;
        }
        .btn-save:hover {
            background: #1f5e38;
            border-color: #3ea85a;
            color: #a0f0b8;
        }
        .btn-load {
            background: #1a3550;
            color: #7eb8e8;
            border-color: #2d5580;
        }
        .btn-load:hover {
            background: #1f4060;
            border-color: #3e70b0;
            color: #a0d0f8;
        }
        .btn-delete {
            background: #3d1a1f;
            color: #e89090;
            border-color: #6d2d30;
        }
        .btn-delete:hover {
            background: #4d2025;
            border-color: #903d40;
            color: #f0a8a8;
        }
        .btn-export {
            background: #2a2a18;
            color: #d4c880;
            border-color: #5a5a30;
        }
        .btn-export:hover {
            background: #353520;
            border-color: #7a7a40;
            color: #e8dca0;
        }
        .btn-import {
            background: #2a1a2a;
            color: #c8a0d4;
            border-color: #5a305a;
        }
        .btn-import:hover {
            background: #352035;
            border-color: #7a407a;
            color: #dcc0e8;
        }

        /* ---- BOTTOM INPUT AREA ---- */
        .bottom-inputs {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 180px;
        }
        .input-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .input-group input {
            padding: 10px 12px;
            border-radius: 7px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: #e8e8e8;
            font-size: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.05em;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77, 166, 255, 0.12);
        }
        .input-group input.invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(224, 85, 106, 0.15);
            animation: shake 0.4s ease;
        }
        .input-group input.valid-change {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(63, 185, 80, 0.15);
            transition: border 0.15s, box-shadow 0.15s;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-4px);
            }
            40% {
                transform: translateX(4px);
            }
            60% {
                transform: translateX(-3px);
            }
            80% {
                transform: translateX(3px);
            }
        }

        .bit-display {
            display: flex;
            gap: 2px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        .bit-chip {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            transition: all 0.15s;
            cursor: default;
        }
        .bit-chip.on {
            background: #0d3d1a;
            color: #00e84c;
            border: 1px solid #1a7a30;
        }
        .bit-chip.off {
            background: #1a1c20;
            color: #555;
            border: 1px solid #2a2d33;
        }

        /* Scrollbar styling */
        .station-list::-webkit-scrollbar {
            width: 5px;
        }
        .station-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .station-list::-webkit-scrollbar-thumb {
            background: #3a3f4b;
            border-radius: 4px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2a2d35;
            color: #e0e0e0;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: var(--success);
            color: #7ee89e;
        }
        .toast.error {
            border-color: var(--danger);
            color: #e89090;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                align-items: center;
            }
            .gate-wrapper {
                min-width: auto;
                width: 100%;
            }
            .gate-scene {
                width: 100%;
                height: auto;
                aspect-ratio: 620/500;
            }
            .right-panel {
                flex: 1 1 auto;
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div class="icon-gate">🚂</div>
            <h1>Ворота негабаритности ЖД</h1>
            <span class="subtitle">Маска оптических датчиков · 16 бит (2 байта)</span>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <!-- Gate visualization -->
            <div class="gate-wrapper">
                <div class="gate-scene" id="gateScene">
                    <!-- SVG background with gate structure -->
                    <svg viewBox="0 0 620 500" xmlns="http://www.w3.org/2000/svg" id="gateSvg">
                        <defs>
                            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#8cb8d4"/>
                                <stop offset="60%" stop-color="#bfd6e8"/>
                                <stop offset="100%" stop-color="#d5dfe8"/>
                            </linearGradient>
                            <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stop-color="#4e5663"/>
                                <stop offset="30%" stop-color="#636b78"/>
                                <stop offset="50%" stop-color="#6e7684"/>
                                <stop offset="70%" stop-color="#5b6370"/>
                                <stop offset="100%" stop-color="#454c58"/>
                            </linearGradient>
                            <linearGradient id="frameGradV" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#555d6a"/>
                                <stop offset="50%" stop-color="#636b78"/>
                                <stop offset="100%" stop-color="#484f5b"/>
                            </linearGradient>
                            <linearGradient id="postGrad" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stop-color="#3d4450"/>
                                <stop offset="25%" stop-color="#525a66"/>
                                <stop offset="50%" stop-color="#5d6572"/>
                                <stop offset="75%" stop-color="#4c5460"/>
                                <stop offset="100%" stop-color="#383f4a"/>
                            </linearGradient>
                            <pattern id="stripes" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(0)">
                                <rect width="20" height="40" fill="#d4a82c"/>
                                <rect x="20" width="20" height="40" fill="#2c2c2c"/>
                            </pattern>
                            <pattern id="stripesLeft" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(90)">
                                <rect width="20" height="40" fill="#d4a82c"/>
                                <rect x="20" width="20" height="40" fill="#2c2c2c"/>
                            </pattern>
                            <pattern id="stripesRight" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(90)">
                                <rect width="20" height="40" fill="#d4a82c"/>
                                <rect x="20" width="20" height="40" fill="#2c2c2c"/>
                            </pattern>
                            <clipPath id="gateClip">
                                <rect x="55" y="50" width="510" height="370" rx="4"/>
                            </clipPath>
                        </defs>

                        <!-- Sky -->
                        <rect x="0" y="0" width="620" height="500" fill="url(#skyGrad)"/>

                        <!-- Distant trees/horizon -->
                        <ellipse cx="80" cy="370" rx="70" ry="50" fill="#7a9e6e" opacity="0.5"/>
                        <ellipse cx="200" cy="365" rx="90" ry="55" fill="#6d8f62" opacity="0.45"/>
                        <ellipse cx="350" cy="368" rx="75" ry="48" fill="#7a9e6e" opacity="0.5"/>
                        <ellipse cx="500" cy="362" rx="85" ry="52" fill="#6d8f62" opacity="0.45"/>
                        <ellipse cx="580" cy="370" rx="55" ry="40" fill="#7a9e6e" opacity="0.4"/>

                        <!-- Ground -->
                        <rect x="0" y="395" width="620" height="105" fill="#5c4a3a"/>
                        <rect x="0" y="395" width="620" height="8" fill="#6b5b4a"/>

                        <!-- Ballast / gravel area under tracks -->
                        <rect x="60" y="403" width="500" height="30" fill="#7a6a55" rx="3"/>

                        <!-- Sleepers -->
                        <g fill="#5a4030" stroke="#4a3025" stroke-width="1">
                            <rect x="90" y="407" width="12" height="48" rx="2"/>
                            <rect x="130" y="407" width="12" height="48" rx="2"/>
                            <rect x="170" y="407" width="12" height="48" rx="2"/>
                            <rect x="210" y="407" width="12" height="48" rx="2"/>
                            <rect x="250" y="407" width="12" height="48" rx="2"/>
                            <rect x="290" y="407" width="12" height="48" rx="2"/>
                            <rect x="330" y="407" width="12" height="48" rx="2"/>
                            <rect x="370" y="407" width="12" height="48" rx="2"/>
                            <rect x="410" y="407" width="12" height="48" rx="2"/>
                            <rect x="450" y="407" width="12" height="48" rx="2"/>
                            <rect x="490" y="407" width="12" height="48" rx="2"/>
                        </g>

                        <!-- Rails -->
                        <rect x="65" y="420" width="490" height="6" fill="#8a8a8a" rx="2"/>
                        <rect x="65" y="420" width="490" height="3" fill="#b0b0b0" rx="1"/>
                        <rect x="65" y="438" width="490" height="6" fill="#8a8a8a" rx="2"/>
                        <rect x="65" y="438" width="490" height="3" fill="#b0b0b0" rx="1"/>

                        <!-- Gate foundation blocks -->
                        <rect x="55" y="390" width="55" height="20" fill="#6e6e6e" stroke="#555" stroke-width="1.5" rx="2"/>
                        <rect x="510" y="390" width="55" height="20" fill="#6e6e6e" stroke="#555" stroke-width="1.5" rx="2"/>

                        <!-- Left post -->
                        <rect x="55" y="42" width="50" height="348" fill="url(#postGrad)" stroke="#3a404a" stroke-width="2" rx="4"/>
                        <!-- Right post -->
                        <rect x="515" y="42" width="50" height="348" fill="url(#postGrad)" stroke="#3a404a" stroke-width="2" rx="4"/>
                        <!-- Top beam -->
                        <rect x="55" y="42" width="510" height="50" fill="url(#frameGrad)" stroke="#3a404a" stroke-width="2" rx="4"/>

                        <!-- Warning stripes on top beam -->
                        <rect x="105" y="47" width="410" height="40" fill="url(#stripes)" opacity="0.7" rx="2"/>
                        <!-- Warning stripes on left post -->
                        <rect x="60" y="92" width="40" height="280" fill="url(#stripesLeft)" opacity="0.65" rx="2"/>
                        <!-- Warning stripes on right post -->
                        <rect x="520" y="92" width="40" height="280" fill="url(#stripesRight)" opacity="0.65" rx="2"/>

                        <!-- Cross-bracing on posts (decorative) -->
                        <line x1="75" y1="120" x2="95" y2="160" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="95" y1="120" x2="75" y2="160" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="75" y1="200" x2="95" y2="240" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="95" y1="200" x2="75" y2="240" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="525" y1="120" x2="545" y2="160" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="545" y1="120" x2="525" y2="160" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="525" y1="200" x2="545" y2="240" stroke="#7a808a" stroke-width="2" opacity="0.5"/>
                        <line x1="545" y1="200" x2="525" y2="240" stroke="#7a808a" stroke-width="2" opacity="0.5"/>

                        <!-- Inner frame highlight -->
                        <rect x="105" y="92" width="410" height="298" fill="none" stroke="#7a8290" stroke-width="1.5" opacity="0.4" rx="2"/>

                        <!-- Gate label -->
                        <text x="310" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#2c2c2c"
                    letter-spacing="3" opacity="0.7">ВОРОТА НЕГАБАРИТНОСТИ</text>

                    <!-- Sensor mounting points (small brackets) - drawn for all 16 positions -->
                    <g fill="#7a7a7a" stroke="#5a5a5a" stroke-width="1">
                        <!-- Top sensors brackets -->
                        <rect x="116" y="88" width="14" height="8" rx="2"/>
                        <rect x="233" y="88" width="14" height="8" rx="2"/>
                        <rect x="357" y="88" width="14" height="8" rx="2"/>
                        <rect x="474" y="88" width="14" height="8" rx="2"/>
                        <!-- Right sensors brackets -->
                        <rect x="507" y="124" width="8" height="14" rx="2"/>
                        <rect x="507" y="216" width="8" height="14" rx="2"/>
                        <rect x="507" y="308" width="8" height="14" rx="2"/>
                        <rect x="507" y="370" width="8" height="14" rx="2"/>
                        <!-- Bottom sensors brackets -->
                        <rect x="474" y="384" width="14" height="8" rx="2"/>
                        <rect x="357" y="384" width="14" height="8" rx="2"/>
                        <rect x="233" y="384" width="14" height="8" rx="2"/>
                        <rect x="116" y="384" width="14" height="8" rx="2"/>
                        <!-- Left sensors brackets -->
                        <rect x="105" y="370" width="8" height="14" rx="2"/>
                        <rect x="105" y="308" width="8" height="14" rx="2"/>
                        <rect x="105" y="216" width="8" height="14" rx="2"/>
                        <rect x="105" y="124" width="8" height="14" rx="2"/>
                    </g>
                </svg>

                <!-- Sensor dots (overlaid via JS) -->
                <div id="sensorsContainer"></div>
            </div>
        </div>

        <!-- Right panel -->
        <div class="right-panel" id="rightPanel">
            <h3>📋 Станции / Маски</h3>
            <div class="station-list" id="stationList">
                <div class="empty-msg">Нет сохранённых станций</div>
            </div>
            <div class="station-input-row">
                <input type="text" id="stationNameInput" placeholder="Название станции..." maxlength="40">
            </div>
            <div class="btn-row">
                <button class="btn btn-save" id="btnSave" title="Сохранить текущую маску">💾 Сохранить</button>
                <button class="btn btn-load" id="btnLoad" title="Загрузить выбранную маску">📂 Загрузить</button>
                <button class="btn btn-delete" id="btnDelete" title="Удалить выбранную станцию">🗑 Удалить</button>
            </div>
            <div class="btn-row" style="margin-top:2px;">
                <button class="btn btn-export" id="btnExport" title="Экспорт всех данных в JSON">📤 Экспорт</button>
                <button class="btn btn-import" id="btnImport" title="Импорт данных из JSON">📥 Импорт</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
        </div>
    </div>

    <!-- Bottom inputs -->
    <div class="bottom-inputs">
        <div class="input-group">
            <label>🔢 Маска (бинарная) — 16 бит, MSB слева</label>
            <input type="text" id="binaryInput" placeholder="1010101010101010" maxlength="19" autocomplete="off">
            <div class="bit-display" id="bitDisplay"></div>
        </div>
        <div class="input-group">
            <label>🔣 Маска (HEX) — 4 символа</label>
            <input type="text" id="hexInput" placeholder="AAAA" maxlength="6" autocomplete="off">
        </div>
    </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // DOM references
            // ──────────────────────────────────────
            const gateScene = document.getElementById('gateScene');
            const sensorsContainer = document.getElementById('sensorsContainer');
            const binaryInput = document.getElementById('binaryInput');
            const hexInput = document.getElementById('hexInput');
            const bitDisplay = document.getElementById('bitDisplay');
            const stationList = document.getElementById('stationList');
            const stationNameInput = document.getElementById('stationNameInput');
            const btnSave = document.getElementById('btnSave');
            const btnLoad = document.getElementById('btnLoad');
            const btnDelete = document.getElementById('btnDelete');
            const btnExport = document.getElementById('btnExport');
            const btnImport = document.getElementById('btnImport');
            const importFileInput = document.getElementById('importFileInput');
            const toast = document.getElementById('toast');

            const STORAGE_KEY = 'railway_gate_sensor_masks';
            const TOTAL_BITS = 16;

            // ──────────────────────────────────────
            // Sensor positions on the gate scene
            // (percentages relative to gateScene: 620×500)
            // Arranged clockwise: Top(0-3) → Right(4-7) → Bottom(8-11) → Left(12-15)
            // ──────────────────────────────────────
            const sensorPositions = [
                { bit: 0, xPct: 20.0, yPct: 18.4, label: '0' }, // Top left
                { bit: 1, xPct: 39.3, yPct: 18.0, label: '1' }, // Top mid-left
                { bit: 2, xPct: 59.5, yPct: 18.0, label: '2' }, // Top mid-right
                { bit: 3, xPct: 78.7, yPct: 18.4, label: '3' }, // Top right
                { bit: 4, xPct: 83.4, yPct: 27.0, label: '4' }, // Right top
                { bit: 5, xPct: 83.4, yPct: 45.6, label: '5' }, // Right mid-upper
                { bit: 6, xPct: 83.4, yPct: 64.0, label: '6' }, // Right mid-lower
                { bit: 7, xPct: 83.4, yPct: 77.0, label: '7' }, // Right bottom
                { bit: 8, xPct: 78.7, yPct: 79.5, label: '8' }, // Bottom right
                { bit: 9, xPct: 59.5, yPct: 79.9, label: '9' }, // Bottom mid-right
                { bit: 10, xPct: 39.3, yPct: 79.9, label: '10' }, // Bottom mid-left
                { bit: 11, xPct: 20.0, yPct: 79.5, label: '11' }, // Bottom left
                { bit: 12, xPct: 16.6, yPct: 77.0, label: '12' }, // Left bottom
                { bit: 13, xPct: 16.6, yPct: 64.0, label: '13' }, // Left mid-lower
                { bit: 14, xPct: 16.6, yPct: 45.6, label: '14' }, // Left mid-upper
                { bit: 15, xPct: 16.6, yPct: 27.0, label: '15' }, // Left top
            ];

            // ──────────────────────────────────────
            // State
            // ──────────────────────────────────────
            let currentMask = 0; // 16-bit integer (0-65535)
            let stations = []; // { name: string, mask: number }[]
            let selectedStationIndex = -1; // index in stations array
            let sensorElements = []; // DOM elements for each sensor
            let isUpdatingFromCode = false; // flag to prevent infinite update loops

            // ──────────────────────────────────────
            // Toast helper
            // ──────────────────────────────────────
            let toastTimer = null;

            function showToast(message, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toast.className = 'toast';
                }, 2200);
            }

            // ──────────────────────────────────────
            // Create sensor elements
            // ──────────────────────────────────────
            function createSensorElements() {
                sensorsContainer.innerHTML = '';
                sensorElements = [];
                sensorPositions.forEach((pos) => {
                    const dot = document.createElement('div');
                    dot.className = 'sensor-dot';
                    dot.style.left = pos.xPct + '%';
                    dot.style.top = pos.yPct + '%';
                    dot.title = 'Датчик №' + pos.bit + ' (бит ' + pos.bit + ')';
                    dot.dataset.bit = pos.bit;
                    dot.addEventListener('click', () => onSensorClick(pos.bit));

                    const label = document.createElement('span');
                    label.className = 'sensor-label';
                    label.textContent = pos.label;
                    label.style.left = pos.xPct + '%';
                    label.style.top = (pos.yPct + 3.2) + '%';

                    sensorsContainer.appendChild(dot);
                    sensorsContainer.appendChild(label);
                    sensorElements[pos.bit] = dot;
                });
            }

            // ──────────────────────────────────────
            // Update sensor visuals from mask
            // ──────────────────────────────────────
            function updateSensorVisuals() {
                for (let bit = 0; bit < TOTAL_BITS; bit++) {
                    const el = sensorElements[bit];
                    if (!el) continue;
                    const isActive = (currentMask >> bit) & 1;
                    if (isActive) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                }
            }

            // ──────────────────────────────────────
            // Convert mask to binary string (MSB first)
            // ──────────────────────────────────────
            function maskToBinaryString(mask) {
                let bin = '';
                for (let i = TOTAL_BITS - 1; i >= 0; i--) {
                    bin += (mask >> i) & 1;
                }
                return bin;
            }

            // ──────────────────────────────────────
            // Convert mask to hex string (4 digits, uppercase)
            // ──────────────────────────────────────
            function maskToHexString(mask) {
                return mask.toString(16).toUpperCase().padStart(4, '0');
            }

            // ──────────────────────────────────────
            // Update all UI from currentMask
            // ──────────────────────────────────────
            function updateAllUI(source = 'code') {
                isUpdatingFromCode = true;
                updateSensorVisuals();
                updateBinaryInput();
                updateHexInput();
                updateBitDisplay();
                isUpdatingFromCode = false;
            }

            function updateBinaryInput() {
                binaryInput.value = maskToBinaryString(currentMask);
                binaryInput.classList.remove('invalid', 'valid-change');
            }

            function updateHexInput() {
                hexInput.value = maskToHexString(currentMask);
                hexInput.classList.remove('invalid', 'valid-change');
            }

            function updateBitDisplay() {
                const bin = maskToBinaryString(currentMask);
                let html = '';
                for (let i = 0; i < TOTAL_BITS; i++) {
                    const bitVal = bin[i];
                    const bitNum = TOTAL_BITS - 1 - i;
                    const cls = bitVal === '1' ? 'on' : 'off';
                    html +=
                        `<span class="bit-chip ${cls}" title="Бит ${bitNum}: ${bitVal === '1' ? 'ВКЛ' : 'выкл'}">${bitVal}</span>`;
                    if (i === 3 || i === 7 || i === 11) {
                        html += '<span style="width:4px;"></span>';
                    }
                }
                bitDisplay.innerHTML = html;
            }

            // ──────────────────────────────────────
            // Set mask and update
            // ──────────────────────────────────────
            function setMask(newMask) {
                newMask = newMask & 0xFFFF; // clamp to 16 bits
                if (currentMask === newMask) return;
                currentMask = newMask;
                updateAllUI();
            }

            // ──────────────────────────────────────
            // Sensor click handler
            // ──────────────────────────────────────
            function onSensorClick(bit) {
                const newMask = currentMask ^ (1 << bit); // toggle bit
                setMask(newMask);
                // Clear station selection since mask changed manually
                if (selectedStationIndex >= 0) {
                    selectedStationIndex = -1;
                    updateStationListUI();
                }
            }

            // ──────────────────────────────────────
            // Binary input handler
            // ──────────────────────────────────────
            binaryInput.addEventListener('input', function() {
                if (isUpdatingFromCode) return;
                let raw = binaryInput.value.replace(/\s+/g, '');
                // Allow only 0 and 1
                const cleaned = raw.replace(/[^01]/g, '');
                if (cleaned !== raw) {
                    binaryInput.value = cleaned;
                    raw = cleaned;
                }
                if (raw.length === TOTAL_BITS) {
                    const mask = parseInt(raw, 2);
                    if (!isNaN(mask)) {
                        setMask(mask);
                        binaryInput.classList.add('valid-change');
                        binaryInput.classList.remove('invalid');
                        if (selectedStationIndex >= 0) {
                            selectedStationIndex = -1;
                            updateStationListUI();
                        }
                        setTimeout(() => binaryInput.classList.remove('valid-change'), 600);
                    }
                } else if (raw.length > TOTAL_BITS) {
                    binaryInput.value = raw.substring(0, TOTAL_BITS);
                }
            });

            binaryInput.addEventListener('blur', function() {
                if (isUpdatingFromCode) return;
                let raw = binaryInput.value.replace(/\s+/g, '').replace(/[^01]/g, '');
                if (raw.length === 0) {
                    binaryInput.value = maskToBinaryString(currentMask);
                    return;
                }
                if (raw.length < TOTAL_BITS) {
                    raw = raw.padStart(TOTAL_BITS, '0');
                }
                if (raw.length > TOTAL_BITS) {
                    raw = raw.substring(0, TOTAL_BITS);
                }
                const mask = parseInt(raw, 2);
                if (!isNaN(mask)) {
                    setMask(mask);
                    binaryInput.value = maskToBinaryString(currentMask);
                    if (selectedStationIndex >= 0) {
                        selectedStationIndex = -1;
                        updateStationListUI();
                    }
                }
                binaryInput.classList.remove('invalid', 'valid-change');
            });

            binaryInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    binaryInput.blur();
                }
            });

            // ──────────────────────────────────────
            // Hex input handler
            // ──────────────────────────────────────
            hexInput.addEventListener('input', function() {
                if (isUpdatingFromCode) return;
                let raw = hexInput.value.replace(/\s+/g, '').replace(/^0x|^0X/, '');
                // Allow only hex chars
                const cleaned = raw.replace(/[^0-9a-fA-F]/g, '');
                if (cleaned !== raw) {
                    hexInput.value = cleaned;
                    raw = cleaned;
                }
                if (raw.length >= 1 && raw.length <= 4 && /^[0-9a-fA-F]+$/.test(raw)) {
                    const mask = parseInt(raw.padEnd(4, '0'), 16);
                    if (!isNaN(mask)) {
                        // Only auto-update if 4 full digits, or on every valid input
                        const padded = raw.padStart(4, '0');
                        const maskFull = parseInt(padded, 16);
                        setMask(maskFull);
                        hexInput.classList.add('valid-change');
                        hexInput.classList.remove('invalid');
                        if (selectedStationIndex >= 0) {
                            selectedStationIndex = -1;
                            updateStationListUI();
                        }
                        setTimeout(() => hexInput.classList.remove('valid-change'), 600);
                    }
                } else if (raw.length > 4) {
                    hexInput.value = raw.substring(0, 4);
                }
            });

            hexInput.addEventListener('blur', function() {
                if (isUpdatingFromCode) return;
                let raw = hexInput.value.replace(/\s+/g, '').replace(/^0x|^0X/, '').replace(/[^0-9a-fA-F]/g,
                    '');
                if (raw.length === 0) {
                    hexInput.value = maskToHexString(currentMask);
                    return;
                }
                if (raw.length > 4) raw = raw.substring(0, 4);
                raw = raw.padStart(4, '0').toUpperCase();
                const mask = parseInt(raw, 16);
                if (!isNaN(mask)) {
                    setMask(mask);
                    hexInput.value = maskToHexString(currentMask);
                    if (selectedStationIndex >= 0) {
                        selectedStationIndex = -1;
                        updateStationListUI();
                    }
                }
                hexInput.classList.remove('invalid', 'valid-change');
            });

            hexInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    hexInput.blur();
                }
            });

            // ──────────────────────────────────────
            // Station list management
            // ──────────────────────────────────────
            function loadStationsFromStorage() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) {
                            stations = parsed.filter(s => s && typeof s.name === 'string' && typeof s.mask ===
                                'number');
                            // Clamp masks
                            stations.forEach(s => { s.mask = s.mask & 0xFFFF; });
                        } else {
                            stations = [];
                        }
                    } else {
                        stations = [];
                    }
                } catch (e) {
                    console.error('Ошибка загрузки данных:', e);
                    stations = [];
                }
                selectedStationIndex = -1;
                updateStationListUI();
            }

            function saveStationsToStorage() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(stations));
                } catch (e) {
                    console.error('Ошибка сохранения данных:', e);
                    showToast('Ошибка сохранения в localStorage', 'error');
                }
            }

            function updateStationListUI() {
                stationList.innerHTML = '';
                if (stations.length === 0) {
                    stationList.innerHTML = '<div class="empty-msg">Нет сохранённых станций</div>';
                } else {
                    stations.forEach((st, index) => {
                        const item = document.createElement('div');
                        item.className = 'station-item';
                        if (index === selectedStationIndex) {
                            item.classList.add('selected');
                        }
                        item.innerHTML = `
                            <span class="st-name">${escapeHTML(st.name)}</span>
                            <span class="st-mask">${maskToHexString(st.mask)}</span>
                        `;
                        item.addEventListener('click', () => {
                            selectedStationIndex = index;
                            updateStationListUI();
                            // Also load into inputs for preview
                            stationNameInput.value = st.name;
                        });
                        stationList.appendChild(item);
                    });
                }
                updateButtonStates();
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function updateButtonStates() {
                const hasSelection = selectedStationIndex >= 0 && selectedStationIndex < stations.length;
                btnLoad.disabled = !hasSelection;
                btnDelete.disabled = !hasSelection;
                if (!hasSelection) {
                    btnLoad.style.opacity = '0.5';
                    btnDelete.style.opacity = '0.5';
                } else {
                    btnLoad.style.opacity = '1';
                    btnDelete.style.opacity = '1';
                }
            }

            // ──────────────────────────────────────
            // Button handlers
            // ──────────────────────────────────────
            btnSave.addEventListener('click', () => {
                const name = stationNameInput.value.trim();
                if (!name) {
                    showToast('Введите название станции перед сохранением', 'error');
                    stationNameInput.focus();
                    return;
                }
                // Check if station with this name already exists
                const existingIndex = stations.findIndex(s => s.name.toLowerCase() === name.toLowerCase());
                if (existingIndex >= 0) {
                    // Update existing
                    stations[existingIndex].mask = currentMask;
                    selectedStationIndex = existingIndex;
                    showToast('Станция "' + escapeHTML(name) + '" обновлена (маска: ' + maskToHexString(
                        currentMask) + ')', 'success');
                } else {
                    // Add new
                    stations.push({ name: name, mask: currentMask });
                    selectedStationIndex = stations.length - 1;
                    showToast('Станция "' + escapeHTML(name) + '" сохранена (маска: ' + maskToHexString(
                        currentMask) + ')', 'success');
                }
                saveStationsToStorage();
                updateStationListUI();
                stationNameInput.value = '';
            });

            btnLoad.addEventListener('click', () => {
                if (selectedStationIndex < 0 || selectedStationIndex >= stations.length) {
                    showToast('Выберите станцию из списка для загрузки', 'error');
                    return;
                }
                const st = stations[selectedStationIndex];
                setMask(st.mask);
                stationNameInput.value = st.name;
                showToast('Загружена станция "' + escapeHTML(st.name) + '" (маска: ' + maskToHexString(st.mask) +
                    ')', 'success');
            });

            btnDelete.addEventListener('click', () => {
                if (selectedStationIndex < 0 || selectedStationIndex >= stations.length) {
                    showToast('Выберите станцию из списка для удаления', 'error');
                    return;
                }
                const st = stations[selectedStationIndex];
                if (confirm('Удалить станцию "' + st.name + '" (маска: ' + maskToHexString(st.mask) + ')?')) {
                    stations.splice(selectedStationIndex, 1);
                    selectedStationIndex = -1;
                    saveStationsToStorage();
                    updateStationListUI();
                    stationNameInput.value = '';
                    showToast('Станция удалена', 'success');
                }
            });

            // Export
            btnExport.addEventListener('click', () => {
                const data = JSON.stringify(stations, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'railway_sensor_masks_' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Данные экспортированы в JSON-файл', 'success');
            });

            // Import
            btnImport.addEventListener('click', () => {
                importFileInput.click();
            });

            importFileInput.addEventListener('change', function() {
                const file = importFileInput.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!Array.isArray(data)) {
                            throw new Error('JSON должен быть массивом');
                        }
                        const validStations = data.filter(s => s && typeof s.name === 'string' && typeof s
                            .mask === 'number');
                        if (validStations.length === 0) {
                            throw new Error('Нет корректных записей (нужны поля name и mask)');
                        }
                        validStations.forEach(s => { s.mask = s.mask & 0xFFFF; });
                        if (confirm('Импортировать ' + validStations.length +
                                ' станций? Текущие данные будут заменены.')) {
                            stations = validStations;
                            selectedStationIndex = -1;
                            saveStationsToStorage();
                            updateStationListUI();
                            stationNameInput.value = '';
                            showToast('Импортировано ' + validStations.length + ' станций', 'success');
                        }
                    } catch (err) {
                        showToast('Ошибка импорта: ' + err.message, 'error');
                    }
                };
                reader.readAsText(file);
                importFileInput.value = '';
            });

            // ──────────────────────────────────────
            // Double-click on station list item = quick load
            // ──────────────────────────────────────
            stationList.addEventListener('dblclick', function(e) {
                const item = e.target.closest('.station-item');
                if (!item) return;
                const items = Array.from(stationList.querySelectorAll('.station-item'));
                const index = items.indexOf(item);
                if (index >= 0 && index < stations.length) {
                    selectedStationIndex = index;
                    updateStationListUI();
                    const st = stations[index];
                    setMask(st.mask);
                    stationNameInput.value = st.name;
                    showToast('Загружена станция "' + escapeHTML(st.name) + '" (двойной клик)', 'success');
                }
            });

            // ──────────────────────────────────────
            // Initialize
            // ──────────────────────────────────────
            function init() {
                createSensorElements();
                loadStationsFromStorage();
                // Default mask: all zeros (можно установить демо-маску)
                currentMask = 0;
                // Для демонстрации можно раскомментировать:
                // currentMask = 0b1010101010101010; // 0xAAAA
                updateAllUI();
                stationNameInput.value = '';
                updateButtonStates();
                // Focus on gate area
                gateScene.focus();
            }

            // ──────────────────────────────────────
            // Handle window resize for sensor repositioning
            // (positions are percentage-based so they adapt automatically)
            // ──────────────────────────────────────
            window.addEventListener('resize', () => {
                // Percentage-based positioning handles this natively
            });

            // ──────────────────────────────────────
            // Keyboard shortcuts
            // ──────────────────────────────────────
            document.addEventListener('keydown', function(e) {
                // Ctrl+S = save
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    btnSave.click();
                }
                // Ctrl+O = load
                if (e.ctrlKey && e.key === 'o') {
                    e.preventDefault();
                    btnLoad.click();
                }
                // Delete key = delete station (when panel focused)
                if (e.key === 'Delete' && document.activeElement === stationNameInput) {
                    // Don't intercept Delete in input
                    return;
                }
                if (e.key === 'Delete' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    btnDelete.click();
                }
            });

            // ──────────────────────────────────────
            // Start
            // ──────────────────────────────────────
            init();
            console.log('🚂 Маска датчиков Ворот негабаритности ЖД готова.');
            console.log('   Кликайте по датчикам на воротах,');
            console.log('   редактируйте бинарную/HEX маску,');
            console.log('   сохраняйте и загружайте конфигурации станций.');
            console.log('   Данные хранятся в localStorage под ключом:', STORAGE_KEY);
        })();
    </script>
</body>
</html>
